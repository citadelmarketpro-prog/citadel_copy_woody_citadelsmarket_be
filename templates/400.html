<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 — Bad Request | Citadels Market Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: ui-sans-serif, system-ui, sans-serif; }
        .glow { text-shadow: 0 0 80px rgba(168,85,247,0.4); }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 1rem; }
        .path-box { background-color: #0f172a; border: 1px solid #334155; border-radius: 0.5rem; font-family: ui-monospace, monospace; }
        .info-box { background-color: rgba(76,29,149,0.15); border: 1px solid rgba(168,85,247,0.25); border-radius: 0.5rem; }
        .btn-primary { background-color: #7c3aed; color: #fff; border-radius: 0.5rem; padding: 0.625rem 1.5rem; font-weight: 600; font-size: 0.875rem; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; transition: background-color 0.2s; }
        .btn-primary:hover { background-color: #6d28d9; }
        .btn-secondary { background-color: #1e293b; border: 1px solid #334155; color: #94a3b8; border-radius: 0.5rem; padding: 0.625rem 1.5rem; font-weight: 600; font-size: 0.875rem; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; transition: all 0.2s; cursor: pointer; }
        .btn-secondary:hover { border-color: #475569; color: #e2e8f0; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-xl">

        <!-- Brand -->
        <div class="text-center mb-8">
            <span class="text-blue-400 font-bold text-lg tracking-wide">
                <i class="fas fa-chart-line mr-2"></i>Citadels Market <span class="text-slate-400 font-normal">Admin</span>
            </span>
        </div>

        <!-- Error Card -->
        <div class="card p-8 text-center">

            <!-- Icon + 400 -->
            <div class="flex items-center justify-center gap-3 mb-2">
                <i class="fas fa-triangle-exclamation text-purple-400 text-4xl"></i>
                <div class="glow text-8xl font-black text-purple-400 select-none">400</div>
            </div>
            <div class="text-slate-400 text-xs font-semibold tracking-widest uppercase mb-6">Bad Request</div>

            <p class="text-slate-300 text-sm mb-6 leading-relaxed">
                The server could not understand this request due to invalid syntax or a malformed URL.
            </p>

            <!-- Reason -->
            <div class="info-box p-4 text-left mb-5">
                <div class="flex items-start gap-2">
                    <i class="fas fa-circle-info text-purple-400 text-xs mt-0.5 shrink-0"></i>
                    <p class="text-purple-300 text-sm leading-relaxed">{{ exception }}</p>
                </div>
            </div>

            <!-- Attempted path -->
            {% if path %}
            <div class="mb-8">
                <p class="text-xs text-slate-500 font-medium mb-2 text-left">Requested path:</p>
                <div class="path-box px-4 py-3 text-left">
                    <span class="text-slate-500 text-xs select-none">GET &nbsp;</span>
                    <span class="text-purple-400 text-sm break-all">{{ path }}</span>
                </div>
            </div>
            {% endif %}

            <!-- Actions -->
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a href="/dashboard/" class="btn-primary">
                    <i class="fas fa-home text-xs"></i> Go to Dashboard
                </a>
                <button onclick="history.back()" class="btn-secondary">
                    <i class="fas fa-arrow-left text-xs"></i> Go Back
                </button>
            </div>
        </div>

        <p class="text-center text-slate-600 text-xs mt-6">
            If you reached this page from a link within the dashboard, please report it.
        </p>
    </div>

</body>
</html>
